name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Tests run in their own job with NO secrets in scope, so a compromised dev/test
  # dependency can't read deploy credentials. The deploy job is gated on this passing.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Lint migrations
        run: npm run migration:lint

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      # Repo variable (not a secret): deploy config.example.yaml only on the upstream demo.
      # Without your own config.yaml the deploy fails fast unless this is set.
      ALLOW_EXAMPLE_CONFIG: ${{ vars.ALLOW_EXAMPLE_CONFIG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # npm ci runs before any secret is in scope, so package install / postinstall
      # scripts never see the deploy credentials.
      - name: Install dependencies
        run: npm ci

      - name: Provision Cloudflare resources
        run: npm run provision
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: npm run d1:migrate:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import config
        run: npm run config:import
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        id: deploy
        run: |
          output=$(npm run deploy 2>&1)
          echo "$output"
          url=$(echo "$output" | grep -oE 'https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev[^ ]*' | head -1)
          [ -z "$url" ] && echo "Could not parse Worker URL from deploy output" && exit 1
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync Worker secrets
        run: npm run secrets:sync
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # All repository secrets as JSON, so secrets:sync can resolve the runtime ${VAR}
          # placeholders in config.yaml (the needed set is per-deployment and not enumerable
          # from a step). Scoped to THIS step only — kept out of checkout/install/test.
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}

      - name: Smoke test
        run: |
          url="${{ steps.deploy.outputs.url }}/public"
          sleep 5
          http_code=$(curl -sf -o /dev/null -w "%{http_code}" "$url")
          [ "$http_code" = "200" ] || { echo "Smoke test failed: HTTP $http_code from $url"; exit 1; }
          echo "Smoke test passed: $url returned HTTP 200"
