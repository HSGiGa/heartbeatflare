# yaml-language-server: $schema=./config.schema.json

deploy:
  name: heartbeatflare # worker name; D1/queue names derive from it unless overridden
  domain: status.example.com # custom domain route; omit to serve on workers.dev only
  database_id: "" # auto-populated by provision
  # database_name: heartbeatflare-prod-db   # default: ${name}-prod-db
  # queue_name: heartbeatflare-notifications # default: ${name}-notifications

auth:
  provider: cloudflare_access
  team_domain: your-team # auto-populated by deploy:access
  aud: "" # auto-populated by deploy:access

access:
  app_name: heartbeatflare
  # domain defaults to ${deploy.domain}/private
  session_duration: 24h
  identity_provider: "login.example.com"
  policy:
    name: Allow team
    emails:
      - you@example.com

notification_channels:
  - name: Mattermost
    type: slack
    url: ${MATTERMOST_WEBHOOK_URL}
    channel: "#alerts"
    is_default: true

monitors:
  - name: Google
    type: http
    mode: external
    visibility: public
    target: https://www.google.com/generate_204
    interval: 60s
    notification_channels: [Mattermost]
    alerts:
      - condition: "status != 200"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
  - name: Google DNS
    type: dns
    mode: external
    visibility: public
    target: google.com
    interval: 60s
    notification_channels: [Mattermost]
    alerts:
      - condition: "status != up"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
  - name: VPN example.com
    type: tcp
    mode: external
    visibility: private
    ssl: true
    target: vpn.example.com:443
    interval: 5m
    notification_channels: [Mattermost]
    alerts:
      - condition: "connect != true"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
      - condition: ssl_expiry < 14
        severity: warning
        failures: 1
        recovery: 1
  - name: Gmail SMTP
    type: tcp
    mode: external
    visibility: public
    target: smtp.gmail.com:587
    interval: 60s
    notification_channels: [Mattermost]
    alerts:
      - condition: "connect != true"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
