# yaml-language-server: $schema=./config.schema.json

deploy:
  name: heartbeatflare # worker name; D1/queue names derive from it unless overridden
  domain: status.modem.by # custom domain route; omit to serve on workers.dev only
  database_id: "8f199a5c-363a-441e-8b48-a750e4c5a2be" # auto-populated by provision
  # database_name: heartbeatflare-prod-db   # default: ${name}-prod-db
  # queue_name: heartbeatflare-notifications # default: ${name}-notifications

auth:
  provider: cloudflare_access
  team_domain: modem-by # auto-populated by deploy:access
  aud: "c837d4695c934df64d4c02856e1a2db466fe3f486f2c133b2afa166c2f526b20" # auto-populated by deploy:access

access:
  app_name: heartbeatflare
  # domain defaults to ${deploy.domain}/private
  session_duration: 24h
  identity_provider: "login.modem.by"
  policy:
    name: Allow team
    emails:
      - vbondarenko@modem.by

notification_channels:
  - name: Mattermost
    type: slack
    url: ${MATTERMOST_WEBHOOK_URL}
    channel: "#alerts"
    is_default: true
  # - name: Telegram Ops
  #   type: telegram
  #   bot_token: ${TELEGRAM_BOT_TOKEN}   # Worker Secret; never commit the real token
  #   chat_id: "-1001234567890"          # chat/group/channel id, or ${TELEGRAM_CHAT_ID}
  #   is_default: false

monitors:
  - name: Google
    type: http
    mode: external
    visibility: public
    target: https://www.google.com/generate_204
    interval: 60s
    notification_channels: [ Mattermost ]
    alerts:
      - condition: "status != 200"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
  - name: Google DNS
    type: dns
    mode: external
    visibility: public
    target: google.com
    interval: 60s
    notification_channels: [ Mattermost ]
    alerts:
      - condition: "status != up"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
  - name: VPN modem.by
    type: tcp
    mode: external
    visibility: private
    ssl: true
    target: vpn.modem.by:443
    interval: 5m
    notification_channels: [ Mattermost ]
    alerts:
      - condition: "connect != true"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
      - condition: ssl_expiry < 14
        severity: warning
        failures: 1
        recovery: 1
  - name: Gmail SMTP
    type: tcp
    mode: external
    visibility: public
    enabled: false
    target: smtp.gmail.com:587
    interval: 60s
    notification_channels: [ Mattermost ]
    alerts:
      - condition: "connect != true"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
  - name: Test Alert
    type: http
    mode: external
    visibility: private
    target: https://nonexistent-alert-test.invalid
    interval: 60s
    notification_channels: [ Mattermost ]
    alerts:
      - condition: "status != 200"
        severity: critical
        failures: 1
        recovery: 2
        cooldown: 300s

# Planned maintenance windows. While a window is active the affected monitors are not probed
# (no incident, uptime unaffected) and a banner is shown on the status page. Times are ISO 8601 UTC.
# Omit `monitors:` for a global window covering every monitor.
# maintenance:
#   - title: "Database migration"
#     body: "Upgrading the primary Postgres cluster. Brief downtime expected."
#     starts_at: "2026-06-20T02:00:00Z"
#     ends_at: "2026-06-20T04:00:00Z"
#     monitors: [ Google, VPN modem.by ]
