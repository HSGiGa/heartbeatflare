stages:
  - deploy

deploy_cloudflare:
  stage: deploy
  image: node:24
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    NPM_CONFIG_CACHE: .npm
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run test
    - npm run migration:lint
    - npm run d1:migrate:prod
    - npm run config:import
    - |
      output=$(npm run deploy 2>&1)
      echo "$output"
      url=$(echo "$output" | grep -oE 'https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev[^ ]*' | head -1)
      [ -z "$url" ] && echo "Could not parse Worker URL from deploy output" && exit 1
      sleep 5
      http_code=$(curl -sf -o /dev/null -w "%{http_code}" "$url")
      [ "$http_code" = "200" ] || { echo "Smoke test failed: HTTP $http_code from $url"; exit 1; }
      echo "Smoke test passed: $url returned HTTP 200"
