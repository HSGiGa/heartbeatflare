# yaml-language-server: $schema=./config.schema.json

deploy:
  # name: status # worker name; D1/queue names derive from it unless overridden
  # domain:   # custom domain route; omit to serve on workers.dev only (worker URL: <name>.<subdomain>.workers.dev)
  # database_name: heartbeatflare-prod-db   # default: ${name}-prod-db
  # queue_name: heartbeatflare-notifications # default: ${name}-notifications
  # Cloudflare Workers VPC bindings (BETA) for mode: internal monitors — see the Workers VPC docs:
  # https://developers.cloudflare.com/workers-vpc/ . heartbeatflare only consumes pre-existing VPC
  # resources; it never provisions Networks/Services/Tunnels. Resource ids should be ${VAR}
  # placeholders resolved from .env / CI env at wrangler-generation time (binding names are not
  # secret and may stay here). v1 supports tunnel-backed Networks and scoped Services only — not
  # Cloudflare Mesh (network_id: cf1:network).
  # vpc:
  #   networks:               # broad access to targets reachable through a Cloudflare Tunnel
  #     - binding: DEMO_NETWORK
  #       tunnel_id: ${DEMO_TUNNEL_ID}
  #       # remote: true       # opt in only when testing the real VPC resource locally; default false
  #   services:                # scoped access to a single private service (host:port fixed by the service)
  #     - binding: DEMO_SERVICE
  #       service_id: ${DEMO_VPC_SERVICE_ID}
  # Cloudflare Workers placement hints — passed straight into the generated wrangler.jsonc. See
  # https://developers.cloudflare.com/workers/configuration/placement/ . Set any subset.
  # placement:
  #   mode: smart            # Smart Placement: run the Worker near observed backend latency (only "smart")
  #   region: aws:eu-central-1 # cloud-region hint (AWS/GCP/Azure region ids)
  #   hostname: api.example.com # layer-7 backend hostname hint for single-homed infrastructure
  name: status

# site:
#   title: Acme Status   # heading in the page header + browser tab; defaults to "HeartbeatFlare"

auth:
  provider: cloudflare_access
  team_name: "${CLOUDFLARE_ACCESS_TEAM_NAME}"
  aud: "${CLOUDFLARE_ACCESS_AUD}"

notification_channels:
  - name: Demo Webhook
    type: webhook
    url: ${DEMO_WEBHOOK_URL}
    headers:
      Authorization: Bearer ${DEMO_WEBHOOK_TOKEN}
    is_default: false
  - name: Email
    type: email
    from: noreply@bubblech.com
    from_name: HeartBeat
    to:
      - ops@example.com
      - oncall@example.com
    is_default: true

monitors:
  - name: Google HTTP
    type: http
    mode: external
    visibility: public
    target: https://www.google.com/generate_204
    interval: 60s
    alerts:
      - condition: "status != 200"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
  # Custom request headers (type: http only) — for endpoints that expect a token, environment hint,
  # or other routing header. Values support ${VAR} substitution from Worker secrets, resolved at
  # probe time: the literal ${VAR} is never sent, and a missing secret fails the check. Every HTTP
  # probe also sends a fixed `User-Agent: heartbeatflare/1.0` (config cannot set/override it).
  # NOTE: the User-Agent is for request identification only — not authentication.
  # - name: Example API
  #   type: http
  #   mode: external
  #   visibility: private
  #   target: https://api.example.com/health
  #   interval: 60s
  #   headers:
  #     X-Healthcheck-Token: ${HEALTHCHECK_TOKEN}
  #     X-Environment: production
  #   alerts:
  #     - condition: "status != 200"
  #       severity: critical
  #       failures: 2
  #       recovery: 2
  - name: Cloudflare DNS
    type: dns
    mode: external
    visibility: public
    target: cloudflare.com
    interval: 60s
    alerts:
      - condition: "status != up"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
  - name: SMTP Google (587)
    type: tcp
    mode: external
    visibility: public
    target: smtp.gmail.com:587 # submission port; STARTTLS, so a plain TCP connect check (no ssl)
    interval: 5m
    alerts:
      - condition: "connect != true"
        severity: critical
        failures: 2
        recovery: 2
        cooldown: 300s
  - name: Demo Heartbeat
    type: heartbeat
    mode: external
    visibility: private
    interval: 10m
    alerts:
      - condition: "status != up"
        severity: critical
        failures: 1
        recovery: 1
  # Internal monitors (mode: internal) probe private targets through a Workers VPC binding (see
  # deploy.vpc above). vpc_binding names a network/service binding. v1 supports type http and tcp
  # only (no dns); SSL expiry checks are skipped, so set ssl: false (ssl: true is rejected). For a
  # VPC Service binding the target host:port is ignored (fixed by the service); for a network binding
  # the target is the real private address.
  # - name: Demo Internal Service
  #   type: http
  #   mode: internal
  #   vpc_binding: DEMO_SERVICE
  #   visibility: private
  #   target: http://demo.internal/health
  #   interval: 60s
  #   ssl: false
  #   alerts:
  #     - condition: "status != 200"
  #       severity: critical
  #       failures: 2
  #       recovery: 2
  # - name: Demo Internal Redis
  #   type: tcp
  #   mode: internal
  #   vpc_binding: DEMO_NETWORK
  #   visibility: private
  #   target: 10.0.1.50:6379
  #   interval: 60s
  #   ssl: false
  #   alerts:
  #     - condition: "connect != true"
  #       severity: critical
  #       failures: 2
  #       recovery: 2
  # mode: internal does not imply visibility: private. Publish the status of a private dependency
  # by setting visibility: public — the target itself stays unreachable from the public internet.
  # - name: Demo Internal Service (Public)
  #   type: http
  #   mode: internal
  #   vpc_binding: DEMO_SERVICE
  #   visibility: public
  #   target: http://demo.internal/identity
  #   interval: 5m
  #   ssl: false
  #   alerts:
  #     - condition: "status != 200"
  #       severity: critical
  #       failures: 2
  #       recovery: 2
  - name: Demo Failing Endpoint
    type: http
    mode: external
    visibility: private
    enabled: false
    target: https://nonexistent-alert-test.invalid
    interval: 60s
    alerts:
      - condition: "status != 200"
        severity: critical
        failures: 1
        recovery: 2
        cooldown: 300s

# Planned maintenance windows. While a window is active the affected monitors are not probed
# (no incident, uptime unaffected) and a banner is shown on the status page. Times are ISO 8601 UTC.
# Omit `monitors:` for a global window covering every monitor.
# maintenance:
#   - title: "Database migration"
#     body: "Upgrading the primary Postgres cluster. Brief downtime expected."
#     starts_at: "2026-06-20T02:00:00Z"
#     ends_at: "2026-06-20T04:00:00Z"
#     monitors: [ Google HTTP, Cloudflare DNS ]
